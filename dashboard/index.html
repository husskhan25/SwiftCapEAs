<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SwiftCap EAs Dashboard</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #060e1c;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo img { height: 50px; margin-bottom: 12px; }
        .login-logo h1 { font-size: 22px; color: #FFB91E; margin-bottom: 4px; }
        .login-logo p { color: #8a9bba; font-size: 14px; }

        .login-card {
            background: #0a1628;
            border: 1px solid #1a2a4a;
            border-radius: 12px;
            padding: 30px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            color: #8a9bba;
            font-size: 13px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #060e1c;
            border: 1px solid #1a2a4a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #FFB91E; }

        .form-group input::placeholder { color: #4a5a7a; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFB91E, #e5a617);
            color: #060e1c;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
        }

        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .form-footer {
            text-align: center;
            margin-top: 18px;
        }

        .form-footer a {
            color: #8a9bba;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .form-footer a:hover { color: #FFB91E; }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6666;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #8a9bba;
            font-size: 13px;
            text-decoration: none;
        }

        .back-link a:hover { color: #FFB91E; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">
            <img src="/logo.png" alt="SwiftCap EAs">
            <h1>Dashboard</h1>
            <p>Manage your licenses and activations</p>
        </div>

        <div class="login-card">
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">Log In</button>
            </form>

            <div class="form-footer">
                <a href="/dashboard/forgot-password">Forgot your password?</a>
            </div>
        </div>

        <div class="back-link">
            <a href="/">← Back to SwiftCap EAs</a>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // If already logged in, redirect to licenses
        if (localStorage.getItem('sc_token')) {
            window.location.href = '/dashboard/licenses';
        }

        // Check for URL params (e.g., after password reset)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('reset') === 'success') {
            showSuccess('Password reset successfully. Please log in.');
        }
        if (urlParams.get('set') === 'success') {
            showSuccess('Password set successfully. Please log in.');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('sc_token', data.token);
                    localStorage.setItem('sc_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard/licenses';
                } else {
                    showError(data.error || 'Login failed. Please try again.');
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            } catch (error) {
                showError('Connection error. Please check your internet and try again.');
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        }
    </script>
</body>
</html>
