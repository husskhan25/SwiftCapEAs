<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — SwiftCap EAs</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #060e1c;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 420px; padding: 20px; }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { height: 50px; margin-bottom: 12px; }
        .logo h1 { font-size: 22px; color: #FFB91E; margin-bottom: 4px; }
        .logo p { color: #8a9bba; font-size: 14px; }

        .card {
            background: #0a1628;
            border: 1px solid #1a2a4a;
            border-radius: 12px;
            padding: 30px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            color: #8a9bba;
            font-size: 13px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #060e1c;
            border: 1px solid #1a2a4a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #FFB91E; }
        .form-group input::placeholder { color: #4a5a7a; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFB91E, #e5a617);
            color: #060e1c;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6666;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #8a9bba; font-size: 13px; text-decoration: none; }
        .back-link a:hover { color: #FFB91E; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <img src="/logo.png" alt="SwiftCap EAs">
            <h1>Forgot Password</h1>
            <p>Enter your email to receive a reset link</p>
        </div>

        <div class="card">
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <form id="forgotForm" onsubmit="handleForgot(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Send Reset Link</button>
            </form>
        </div>

        <div class="back-link">
            <a href="/dashboard">← Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE = '';

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        async function handleForgot(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value.trim();

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'forgot-password', email })
                });

                const data = await response.json();
                showSuccess(data.message || 'If an account exists with that email, a reset link has been sent. Check your inbox.');
                document.getElementById('forgotForm').style.display = 'none';

            } catch (error) {
                showError('Connection error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>
</html>
