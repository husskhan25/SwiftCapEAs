<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password — SwiftCap EAs</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #060e1c;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 420px; padding: 20px; }

        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { height: 50px; margin-bottom: 12px; }
        .logo h1 { font-size: 22px; color: #FFB91E; margin-bottom: 4px; }
        .logo p { color: #8a9bba; font-size: 14px; }

        .card {
            background: #0a1628;
            border: 1px solid #1a2a4a;
            border-radius: 12px;
            padding: 30px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            color: #8a9bba;
            font-size: 13px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #060e1c;
            border: 1px solid #1a2a4a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #FFB91E; }
        .form-group input::placeholder { color: #4a5a7a; }

        .password-hint { color: #8a9bba; font-size: 12px; margin-top: 4px; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFB91E, #e5a617);
            color: #060e1c;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 6px;
        }

        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff6666;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .invalid-token {
            text-align: center;
            padding: 20px;
        }

        .invalid-token h2 { color: #ff6666; margin-bottom: 10px; }
        .invalid-token p { color: #8a9bba; font-size: 14px; margin-bottom: 16px; }
        .invalid-token a { color: #FFB91E; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <img src="/logo.png" alt="SwiftCap EAs">
            <h1>Set Your Password</h1>
            <p>Create a password to access your dashboard</p>
        </div>

        <div class="card">
            <div class="error-message" id="errorMsg"></div>

            <div id="formSection">
                <form id="setPasswordForm" onsubmit="handleSetPassword(event)">
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="password" placeholder="Enter a password" required minlength="8">
                        <div class="password-hint">Minimum 8 characters</div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Set Password & Continue</button>
                </form>
            </div>

            <div id="invalidSection" style="display: none;">
                <div class="invalid-token">
                    <h2>Invalid or Expired Link</h2>
                    <p>This password setup link is no longer valid. You can request a new one.</p>
                    <a href="/dashboard/forgot-password">Request New Link →</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.swiftcapeas.com';

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const setupToken = urlParams.get('token');

        if (!setupToken) {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('invalidSection').style.display = 'block';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function handleSetPassword(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Setting password...';

            try {
                const response = await fetch(`${API_BASE}/api/auth/password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'set-password', token: setupToken, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Auto-login
                    localStorage.setItem('sc_token', data.token);
                    localStorage.setItem('sc_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard/licenses';
                } else {
                    if (response.status === 400 && data.error.includes('expired')) {
                        document.getElementById('formSection').style.display = 'none';
                        document.getElementById('invalidSection').style.display = 'block';
                    } else {
                        showError(data.error || 'Failed to set password');
                        btn.disabled = false;
                        btn.textContent = 'Set Password & Continue';
                    }
                }
            } catch (error) {
                showError('Connection error. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Set Password & Continue';
            }
        }
    </script>
</body>
</html>
