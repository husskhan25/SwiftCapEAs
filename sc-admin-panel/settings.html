<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #060e1c; color: #fff; min-height: 100vh; }

        .topnav { background: #0a1628; border-bottom: 1px solid #1a2a4a; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
        .topnav-left { display: flex; align-items: center; gap: 16px; }
        .topnav-left img { height: 30px; }
        .topnav-left span { color: #8a9bba; font-size: 14px; }
        .topnav-left nav { display: flex; gap: 4px; margin-left: 10px; }
        .topnav-left nav a { color: #8a9bba; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
        .topnav-left nav a:hover { color: #fff; background: #1a2a4a; }
        .topnav-left nav a.active { color: #FFB91E; background: rgba(255,185,30,0.1); }
        .btn-logout { background: none; border: 1px solid #1a2a4a; color: #8a9bba; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        .btn-logout:hover { border-color: #ff4444; color: #ff4444; }

        .main { max-width: 600px; margin: 24px auto; padding: 0 20px; }
        .page-title { font-size: 22px; color: #FFB91E; margin-bottom: 20px; }

        .card {
            background: #0a1628; border: 1px solid #1a2a4a; border-radius: 12px;
            padding: 24px; margin-bottom: 20px;
        }

        .card h2 { font-size: 16px; margin-bottom: 12px; }
        .card p { color: #8a9bba; font-size: 14px; margin-bottom: 16px; }

        .btn-setup {
            padding: 10px 20px; background: #1a2a4a; color: #fff; border: none;
            border-radius: 6px; font-size: 14px; cursor: pointer;
        }

        .btn-setup:hover { background: #2a3a5a; }
        .btn-setup:disabled { opacity: 0.5; }

        .qr-section { text-align: center; margin: 20px 0; display: none; }
        .qr-section img { border-radius: 8px; margin-bottom: 12px; }
        .qr-section .secret-text { font-family: monospace; color: #FFB91E; font-size: 14px; margin-bottom: 16px; word-break: break-all; }

        .verify-section { display: none; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; color: #8a9bba; font-size: 12px; margin-bottom: 4px; }
        .form-group input {
            width: 100%; padding: 10px 12px; background: #060e1c; border: 1px solid #1a2a4a;
            border-radius: 6px; color: #fff; font-size: 16px; text-align: center; outline: none; letter-spacing: 4px;
        }

        .form-group input:focus { border-color: #FFB91E; }

        .btn-verify {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #FFB91E, #e5a617);
            color: #060e1c; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer;
        }

        .status-enabled { color: #22c55e; font-weight: 600; }
        .status-disabled { color: #ff6666; }

        .error-message { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff6666; padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; display: none; }
        .success-message { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>

    <div class="topnav">
        <div class="topnav-left">
            <img src="/logo.png" alt="">
            <span>Admin</span>
            <nav>
                <a href="/sc-admin-panel/dashboard">Licenses</a>
                <a href="/sc-admin-panel/products">Products</a>
                <a href="/sc-admin-panel/users">Users</a>
                <a href="/sc-admin-panel/settings" class="active">Settings</a>
            </nav>
        </div>
        <button class="btn-logout" onclick="adminLogout()">Log Out</button>
    </div>

    <div class="main">
        <h1 class="page-title">Settings</h1>

        <!-- 2FA Setup -->
        <div class="card">
            <h2>Two-Factor Authentication (2FA)</h2>
            <p>Status: <span id="2faStatus" class="status-disabled">Checking...</span></p>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <button class="btn-setup" id="setupBtn" onclick="setup2FA()">Set Up 2FA</button>

            <div class="qr-section" id="qrSection">
                <p style="color:#fff; margin-bottom:12px;">Scan this QR code with Google Authenticator or Authy:</p>
                <img id="qrImage" src="" alt="QR Code" width="200" height="200">
                <p>Or enter this code manually:</p>
                <div class="secret-text" id="secretText"></div>
            </div>

            <div class="verify-section" id="verifySection">
                <form onsubmit="verify2FA(event)">
                    <div class="form-group">
                        <label>Enter the 6-digit code from your app</label>
                        <input type="text" id="verifyCode" maxlength="6" placeholder="000000" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-verify" id="verifyBtn">Verify & Enable 2FA</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.swiftcapeas.com';
        const adminToken = localStorage.getItem('sc_admin_token');
        if (!adminToken) { window.location.href = '/sc-admin-panel'; }

        const admin = JSON.parse(localStorage.getItem('sc_admin') || '{}');

        function adminLogout() {
            localStorage.removeItem('sc_admin_token');
            localStorage.removeItem('sc_admin');
            window.location.href = '/sc-admin-panel';
        }

        // Check 2FA status
        if (admin.totp_enabled) {
            document.getElementById('2faStatus').textContent = 'Enabled';
            document.getElementById('2faStatus').className = 'status-enabled';
            document.getElementById('setupBtn').textContent = '2FA is already enabled';
            document.getElementById('setupBtn').disabled = true;
        } else {
            document.getElementById('2faStatus').textContent = 'Not enabled';
            document.getElementById('2faStatus').className = 'status-disabled';
        }

        async function setup2FA() {
            const btn = document.getElementById('setupBtn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            try {
                const response = await fetch(`${API_BASE}/api/admin/setup-2fa`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('qrImage').src = data.qr_code;
                    document.getElementById('secretText').textContent = data.secret;
                    document.getElementById('qrSection').style.display = 'block';
                    document.getElementById('verifySection').style.display = 'block';
                    btn.style.display = 'none';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Failed to generate 2FA';
                document.getElementById('errorMsg').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Set Up 2FA';
            }
        }

        async function verify2FA(e) {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            const code = document.getElementById('verifyCode').value;

            if (code.length !== 6) {
                document.getElementById('errorMsg').textContent = 'Enter a 6-digit code';
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Verifying...';

            try {
                const response = await fetch(`${API_BASE}/api/admin/setup-2fa`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ totp_code: code })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('successMsg').textContent = '2FA enabled successfully! You will need your authenticator code on every login.';
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('errorMsg').style.display = 'none';
                    document.getElementById('qrSection').style.display = 'none';
                    document.getElementById('verifySection').style.display = 'none';
                    document.getElementById('2faStatus').textContent = 'Enabled';
                    document.getElementById('2faStatus').className = 'status-enabled';

                    // Update local storage
                    admin.totp_enabled = true;
                    localStorage.setItem('sc_admin', JSON.stringify(admin));
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Invalid code';
                    document.getElementById('errorMsg').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Verify & Enable 2FA';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Connection error';
                document.getElementById('errorMsg').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Verify & Enable 2FA';
            }
        }
    </script>
</body>
</html>
